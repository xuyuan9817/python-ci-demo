name: Python CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'

jobs:
  build:
    name: 🏗️ 构建检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${env.PYTHON_VERSION}
          cache: pip
      - name: 安装依赖
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
      - name: 编译检查
        run: |
          python -m compileall ./ -q || true
          echo "✅ 构建检查通过"
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/ build/ || true
          retention-days: 7
        continue-on-error: true

  test:
    name: 🧪 单元测试
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${env.PYTHON_VERSION}
          cache: pip
      - name: 安装依赖
        run: pip install -r requirements.txt pytest pytest-cov pytest-html pytest-xdist
      - name: 运行测试
        run: |
          pytest tests/ --verbose --junitxml=reports/test-results.xml --cov=./ --cov-report=xml:reports/coverage.xml --cov-report=html:reports/coverage-html --html=reports/test-report.html --self-contained-html -n auto || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: reports/
          retention-days: 30
        continue-on-error: true

  quality:
    name: 🔍 质量扫描
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${env.PYTHON_VERSION}
          cache: pip
      - name: 安装质量工具
        run: pip install flake8 black isort mypy bandit safety
      - name: Flake8 检查
        run: flake8 ./ --max-line-length=120 --exclude=.git,__pycache__,venv,dist --statistics || true
      - name: Black 检查
        run: black ./ --check --diff || true
      - name: isort 检查
        run: isort ./ --check-only --diff || true
      - name: SonarQube 扫描
        uses: sonarsource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${ secrets.SONAR_TOKEN }
          SONAR_HOST_URL: ${ secrets.SONAR_HOST_URL }
        continue-on-error: true

  security:
    name: 🛡️ 安全扫描
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${env.PYTHON_VERSION}
          cache: pip
      - name: 安装安全工具
        run: pip install bandit safety pip-audit
      - name: Bandit 扫描
        run: bandit -r ./ -f txt -o reports/bandit.txt || true
      - name: Safety 检查
        run: safety check --json -o reports/safety.json || true
      - name: pip-audit
        run: pip-audit -r requirements.txt || true

  package:
    name: 📦 构建产物
    needs: [test, quality, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${env.PYTHON_VERSION}
          cache: pip
      - name: 构建 Wheel
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/
          retention-days: 30

  deploy:
    name: 🚀 部署测试环境
    needs: package
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: python-package
          path: dist/
      - name: 部署脚本
        run: echo "✅ 部署就绪，请在 STAGING_HOST/SECRETS 中配置部署目标"

  notify:
    name: 📢 通知报告
    needs: [test, quality, security]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 生成汇总
        run: |
          echo "## 📊 CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build | ${needs.build.result} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Test | ${needs.test.result} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Quality | ${needs.quality.result} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡️ Security | ${needs.security.result} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Package | ${needs.package.result} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Commit: \${github.sha}\ | Branch: \${github.ref_name}\ | Actor: @_" >> $GITHUB_STEP_SUMMARY
      - name: 失败邮件通知
        if: failure()
        run: echo "❌ 流水线失败，请检查报告"